baseURL = "/"
title = "Terraform Learning Path"
theme = "book"
locale = "en-us"
defaultContentLanguage = "en"

# Book theme configuration
[params]
  # Website description
  description = "Complete Terraform learning path from zero to production-grade — designed for the Terraform Associate certification"

  # Theme: light, dark, or auto (follows OS preference)
  BookTheme = "dark"

  # Show or hide table of contents
  BookShowToC = true

  # Section numbering
  BookSectionNumber = true

  # Repository configuration
  BookRepo = "https://github.com/YOUR_USERNAME/terraform-learning"
  BookEditPath = "edit/main/content"
  BookCommitPath = "commit/main/content"

  # Hide empty menu sections
  BookMenuBundleDisabled = true

  # Date format
  BookDateFormat = "January 2, 2006"

  # Search
  BookSearch = true

# Author
[author]
  name = "Terraform Learning"

# Syntax highlighting
[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = false
    lineNumbersInTable = false
    noClasses = false
    style = "dracula"
    tabWidth = 2

  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

# Menu configuration
[menu]
  [[menu.before]]
    identifier = "home"
    name = "Home"
    url = "/"
    weight = 1

  [[menu.before]]
    identifier = "docs"
    name = "Documentation"
    url = "/docs/"
    weight = 2

  [[menu.before]]
    identifier = "labs"
    name = "Labs"
    url = "/labs/"
    weight = 3

  [[menu.before]]
    identifier = "examples"
    name = "Examples"
    url = "/examples/"
    weight = 4

# Taxonomies
[taxonomies]
  tag = "tags"
